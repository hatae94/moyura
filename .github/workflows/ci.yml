# SPEC-ENV-SETUP-001 R-I1/R-I2 — CI 스켈레톤.
# install → prisma generate(더미 DIRECT_URL) → affected build/lint/test/typecheck.
# 자동 마이그레이션/배포 스텝 없음(R-I2). 유닛 테스트만 실행(DB 의존 e2e 제외 — jest rootDir=src).
name: CI

on:
  push:
    branches: [master]
  pull_request:

# 동일 ref 의 이전 실행은 취소하여 중복 빌드 방지.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# nx-set-shas 가 마지막 성공 워크플로우 run 을 API 로 조회하려면 actions:read 가 필요하다.
permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # 생성된 Prisma 클라이언트는 gitignore 되어 있어 CI 에서 generate 가 필요하다.
      # 클라이언트 생성 자체는 DB 접속을 하지 않으므로 더미 값으로 충분하다(실제 연결 없음).
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      # 빌드/검증용 더미 env (실제 시크릿 아님). web 빌드는 NEXT_PUBLIC_* 부팅 가드를
      # 통과해야 하고(SPEC-AUTH-001 R-I4/R-E4), backend Zod 는 SUPABASE_URL/ANON_KEY 를 요구한다.
      NODE_ENV: test
      PORT: "3001"
      CORS_ORIGINS: http://192.168.219.102:3000,http://192.168.219.102:8081
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: ci-dummy-anon-key
      NEXT_PUBLIC_API_BASE_URL: http://192.168.219.102:3001
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      EXPO_PUBLIC_API_BASE_URL: http://192.168.219.102:3001
      EXPO_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # nx affected 가 base/head 를 비교할 수 있도록 전체 히스토리를 가져온다.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # gitignore 된 Prisma 클라이언트 생성(build/test/typecheck 전 필수).
      - name: Generate Prisma client
        run: pnpm exec prisma generate
        working-directory: apps/backend

      # gitignore 된 api-client 타입(schema.d.ts) 생성.
      # 체인: api-client:generate → backend:openapi → backend:build → backend:prisma-generate.
      # web/mobile/api-client 의 `./schema` import 가 clean checkout 에서 깨지지 않도록
      # affected 타겟 실행 전에 미리 생성한다(nx dependsOn 배선과 함께 belt-and-suspenders).
      - name: Generate api-client types
        run: pnpm nx run api-client:generate

      # nx affected SHA 설정(PR/푸시 모두 대응).
      - name: Derive nx SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          # 이 저장소의 기본 브랜치는 master (nx-set-shas 기본값 main 아님).
          main-branch-name: master

      # affected 프로젝트에 대해 build/lint/test/typecheck 실행.
      # test = 유닛 테스트만(jest rootDir=src). DB 의존 e2e 는 CI 에서 실행하지 않는다.
      - name: Run affected targets
        run: pnpm nx affected -t build lint test typecheck
