# ============================================================
# Cloud Run 배포 워크플로우 (asia-northeast3 / 서울)
#
# 트리거: workflow_dispatch 전용 (수동 실행)
#   → GCP 리소스가 생성·설정되기 전에 자동 실행되지 않도록
#     의도적으로 push 트리거를 비활성화하였다.
#   → GCP 설정 완료 후 아래 주석 처리된 블록을 해제하여 활성화한다.
#
# 필수 GitHub Secrets (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID          : GCP 프로젝트 ID (예: moyura-prod)
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#                           : Workload Identity Federation 공급자 리소스 이름
#                             (예: projects/123456/locations/global/workloadIdentityPools/github-pool/providers/github-provider)
#   GCP_SERVICE_ACCOUNT     : 배포 서비스 계정 이메일
#                             (예: cloudrun-deployer@moyura-prod.iam.gserviceaccount.com)
#
# [선택] SA JSON Key 방식 대안 (Workload Identity 사용 불가 시):
#   GCP_SA_KEY              : 서비스 계정 JSON 키 (base64 인코딩)
#
# 필수 GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_REGION              : asia-northeast3
#   AR_REPO                 : Artifact Registry 저장소 이름 (예: moyura-backend)
#   CLOUDRUN_SERVICE        : Cloud Run 서비스 이름 (예: moyura-backend)
# ============================================================

name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "이미지 태그 (비워두면 현재 커밋 SHA 사용)"
        required: false
        default: ""

  # GCP 설정 완료 후 아래 주석을 해제하여 master push 시 자동 배포를 활성화한다.
  # CI 워크플로우(ci.yml)가 먼저 통과해야 하므로 ci.yml의 workflow_run 이벤트를 권장한다.
  # -------------------------------------------------------
  # push:
  #   branches: [master]
  #   paths:
  #     - "apps/backend/**"
  #     - ".github/workflows/deploy-cloudrun.yml"
  #     - "Dockerfile"  # apps/backend/Dockerfile
  #     - "pnpm-lock.yaml"
  # -------------------------------------------------------

# 동일 브랜치의 진행 중인 배포를 취소하지 않는다 (부분 배포 방지).
concurrency:
  group: deploy-cloudrun-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Workload Identity Federation 을 위해 id-token 권한이 필요하다.
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  AR_REPO: ${{ vars.AR_REPO || 'moyura-backend' }}
  SERVICE: ${{ vars.CLOUDRUN_SERVICE || 'moyura-backend' }}

jobs:
  build-and-push:
    name: 이미지 빌드 및 Artifact Registry 푸시
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 인증: Workload Identity Federation (키리스, 권장)
      # ------------------------------------------------------------------
      - name: GCP 인증 (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        # SA JSON Key 방식으로 전환하려면 위 with 블록을 아래로 교체한다:
        # with:
        #   credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud CLI 설정
        uses: google-github-actions/setup-gcloud@v2

      # Artifact Registry(asia-northeast3)로의 Docker 인증 설정
      - name: Docker 인증 (Artifact Registry)
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 이미지 태그: workflow_dispatch 입력값이 있으면 사용, 없으면 커밋 SHA
      - name: 이미지 메타데이터 결정
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${TAG}"
          LATEST="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:latest"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # linux/amd64 빌드: GitHub ubuntu-latest는 x86_64 호스트이므로
      # QEMU/buildx 에뮬레이션 없이 네이티브 빌드 가능하다.
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          # BuildKit 레이어 캐시 — Artifact Registry 를 캐시 백엔드로 사용한다.
          cache-from: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:buildcache,mode=max
          # DIRECT_URL 빌드 ARG: prisma generate가 env() 파싱 시 PrismaConfigEnvError를 피하기 위한
          # 더미 값. 실제 DB에 연결하지 않으므로 크레덴셜 유출 위험 없음.
          build-args: |
            DIRECT_URL=postgresql://build:build@127.0.0.1:5432/build

  deploy:
    name: Cloud Run 배포
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: GCP 인증 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: gcloud CLI 설정
        uses: google-github-actions/setup-gcloud@v2

      # ------------------------------------------------------------------
      # Cloud Run 배포
      #
      # 환경변수 전략:
      #   --set-env-vars  : 비시크릿 설정값 (PORT, CORS_ORIGINS 등)
      #   --set-secrets   : Secret Manager 에 저장된 민감 값
      #                     형식: ENV_VAR=SECRET_NAME:latest
      #
      # 스케일 설정:
      #   --min-instances=0 : 스케일-투-제로 (비용 최소화, cold-start 있음)
      #   --min-instances=1 : 상시 워밍 (약 $5-10/월 추가, cold-start 없음)
      #   NestJS의 DI 초기화 시간 (~2-4초)을 고려하면 트래픽이 간헐적인
      #   초기 단계에는 min-instances=0, 실사용자 유입 후 1로 올리길 권장.
      # ------------------------------------------------------------------
      - name: Cloud Run 서비스 배포
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="${{ needs.build-and-push.outputs.image }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60s \
            --set-env-vars="NODE_ENV=production,CORS_ORIGINS=https://htyong.com\,https://www.htyong.com" \
            --set-secrets="\
              DATABASE_URL=MOYURA_DATABASE_URL:latest,\
              DIRECT_URL=MOYURA_DIRECT_URL:latest,\
              SUPABASE_URL=MOYURA_SUPABASE_URL:latest,\
              SUPABASE_ANON_KEY=MOYURA_SUPABASE_ANON_KEY:latest,\
              SUPABASE_SERVICE_ROLE_KEY=MOYURA_SUPABASE_SERVICE_ROLE_KEY:latest,\
              SUPABASE_JWT_SECRET=MOYURA_SUPABASE_JWT_SECRET:latest,\
              FIREBASE_CREDENTIALS=MOYURA_FIREBASE_CREDENTIALS:latest" \
            --allow-unauthenticated \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      # 배포된 서비스 URL 출력 (검증 및 로그 확인용)
      - name: 배포된 서비스 URL 출력
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "배포 완료: ${URL}"
          echo "헬스체크: ${URL}/health"

      # 헬스체크 검증 — 배포 후 /health 가 200 을 반환하는지 확인한다.
      - name: 헬스체크 검증
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          # Cloud Run이 새 리비전을 라우팅하기까지 잠시 대기
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "헬스체크 실패: HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "헬스체크 통과: HTTP ${HTTP_CODE}"
